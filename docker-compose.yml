services:
  # Redis (Celery broker + cache)
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - DATABASE_URL=sqlite:////app/data/stockscanner.db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - API_HOST=0.0.0.0
      - API_PORT=8000
      # CORS - configurable for production, defaults to localhost for dev
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost,http://localhost:80,http://frontend}
      # API Keys (from .env or .env.docker)
      - ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_API_KEYS=${GROQ_API_KEYS:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - TOGETHER_API_KEY=${TOGETHER_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - SERPER_API_KEY=${SERPER_API_KEY:-}
      # XUI Twitter ingestion
      - XUI_ENABLED=${XUI_ENABLED:-true}
      - XUI_CONFIG_PATH=${XUI_CONFIG_PATH:-/app/data/xui-reader/config.toml}
      - XUI_PROFILE=${XUI_PROFILE:-default}
      - XUI_LIMIT_PER_SOURCE=${XUI_LIMIT_PER_SOURCE:-50}
      - XUI_NEW_ONLY=${XUI_NEW_ONLY:-true}
      - XUI_CHECKPOINT_MODE=${XUI_CHECKPOINT_MODE:-auto}
      - XUI_BRIDGE_ENABLED=${XUI_BRIDGE_ENABLED:-true}
      - XUI_BRIDGE_ALLOWED_ORIGINS=${XUI_BRIDGE_ALLOWED_ORIGINS:-http://localhost:80,http://127.0.0.1:80,http://localhost:5173,http://127.0.0.1:5173}
      - XUI_BRIDGE_CHALLENGE_TTL_SECONDS=${XUI_BRIDGE_CHALLENGE_TTL_SECONDS:-120}
      - XUI_BRIDGE_MAX_COOKIES=${XUI_BRIDGE_MAX_COOKIES:-300}
      - TWITTER_REQUEST_DELAY=${TWITTER_REQUEST_DELAY:-5.0}
      # LLM Routing (optional overrides)
      - LLM_DEFAULT_PROVIDER=${LLM_DEFAULT_PROVIDER:-groq}
      - LLM_CHATBOT_MODEL=${LLM_CHATBOT_MODEL:-}
      - LLM_RESEARCH_MODEL=${LLM_RESEARCH_MODEL:-}
      - LLM_FALLBACK_ENABLED=${LLM_FALLBACK_ENABLED:-true}
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/readyz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    stop_grace_period: 30s
    restart: unless-stopped

  # Celery Worker - General Queue (concurrency=1 for SQLite safety)
  celery-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A app.celery_app worker --loglevel=info --concurrency=1 -Q celery -n general@%h
    environment:
      # Set HOME for yfinance cache (writes to /app/data/.cache/py-yfinance)
      - HOME=/app/data
      - TZ=${CELERY_TIMEZONE:-America/New_York}
      - CELERY_TIMEZONE=${CELERY_TIMEZONE:-America/New_York}
      - DATABASE_URL=sqlite:////app/data/stockscanner.db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      # API Keys
      - ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_API_KEYS=${GROQ_API_KEYS:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - TOGETHER_API_KEY=${TOGETHER_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - SERPER_API_KEY=${SERPER_API_KEY:-}
      # XUI Twitter ingestion
      - XUI_ENABLED=${XUI_ENABLED:-true}
      - XUI_CONFIG_PATH=${XUI_CONFIG_PATH:-/app/data/xui-reader/config.toml}
      - XUI_PROFILE=${XUI_PROFILE:-default}
      - XUI_LIMIT_PER_SOURCE=${XUI_LIMIT_PER_SOURCE:-50}
      - XUI_NEW_ONLY=${XUI_NEW_ONLY:-true}
      - XUI_CHECKPOINT_MODE=${XUI_CHECKPOINT_MODE:-auto}
      - TWITTER_REQUEST_DELAY=${TWITTER_REQUEST_DELAY:-5.0}
      # LLM Routing
      - LLM_DEFAULT_PROVIDER=${LLM_DEFAULT_PROVIDER:-groq}
      - LLM_CHATBOT_MODEL=${LLM_CHATBOT_MODEL:-}
      - LLM_RESEARCH_MODEL=${LLM_RESEARCH_MODEL:-}
      - LLM_FALLBACK_ENABLED=${LLM_FALLBACK_ENABLED:-true}
    volumes:
      - ./data:/app/data
    depends_on:
      - backend
      - redis
    stop_grace_period: 30s
    restart: unless-stopped

  # Celery Worker - Data Fetch Queue (serialized, concurrency=1)
  celery-datafetch:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A app.celery_app worker --loglevel=info --concurrency=1 -Q data_fetch -n datafetch@%h
    environment:
      # Set HOME for yfinance cache (writes to /app/data/.cache/py-yfinance)
      - HOME=/app/data
      - TZ=${CELERY_TIMEZONE:-America/New_York}
      - CELERY_TIMEZONE=${CELERY_TIMEZONE:-America/New_York}
      - DATABASE_URL=sqlite:////app/data/stockscanner.db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      # API Keys
      - ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_API_KEYS=${GROQ_API_KEYS:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - TOGETHER_API_KEY=${TOGETHER_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - SERPER_API_KEY=${SERPER_API_KEY:-}
      # XUI Twitter ingestion
      - XUI_ENABLED=${XUI_ENABLED:-true}
      - XUI_CONFIG_PATH=${XUI_CONFIG_PATH:-/app/data/xui-reader/config.toml}
      - XUI_PROFILE=${XUI_PROFILE:-default}
      - XUI_LIMIT_PER_SOURCE=${XUI_LIMIT_PER_SOURCE:-50}
      - XUI_NEW_ONLY=${XUI_NEW_ONLY:-true}
      - XUI_CHECKPOINT_MODE=${XUI_CHECKPOINT_MODE:-auto}
      - TWITTER_REQUEST_DELAY=${TWITTER_REQUEST_DELAY:-5.0}
      # LLM Routing
      - LLM_DEFAULT_PROVIDER=${LLM_DEFAULT_PROVIDER:-groq}
      - LLM_CHATBOT_MODEL=${LLM_CHATBOT_MODEL:-}
      - LLM_RESEARCH_MODEL=${LLM_RESEARCH_MODEL:-}
      - LLM_FALLBACK_ENABLED=${LLM_FALLBACK_ENABLED:-true}
    volumes:
      - ./data:/app/data
    depends_on:
      - backend
      - redis
    stop_grace_period: 30s
    restart: unless-stopped

  # Celery Worker - User Scans Queue (isolated from maintenance jobs)
  celery-userscans:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A app.celery_app worker --loglevel=info --concurrency=1 -Q user_scans -n userscans@%h
    environment:
      # Set HOME for yfinance cache (writes to /app/data/.cache/py-yfinance)
      - HOME=/app/data
      - TZ=${CELERY_TIMEZONE:-America/New_York}
      - CELERY_TIMEZONE=${CELERY_TIMEZONE:-America/New_York}
      - DATABASE_URL=sqlite:////app/data/stockscanner.db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      # API Keys
      - ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_API_KEYS=${GROQ_API_KEYS:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - TOGETHER_API_KEY=${TOGETHER_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - SERPER_API_KEY=${SERPER_API_KEY:-}
      # XUI Twitter ingestion
      - XUI_ENABLED=${XUI_ENABLED:-true}
      - XUI_CONFIG_PATH=${XUI_CONFIG_PATH:-/app/data/xui-reader/config.toml}
      - XUI_PROFILE=${XUI_PROFILE:-default}
      - XUI_LIMIT_PER_SOURCE=${XUI_LIMIT_PER_SOURCE:-50}
      - XUI_NEW_ONLY=${XUI_NEW_ONLY:-true}
      - XUI_CHECKPOINT_MODE=${XUI_CHECKPOINT_MODE:-auto}
      - TWITTER_REQUEST_DELAY=${TWITTER_REQUEST_DELAY:-5.0}
      # LLM Routing
      - LLM_DEFAULT_PROVIDER=${LLM_DEFAULT_PROVIDER:-groq}
      - LLM_CHATBOT_MODEL=${LLM_CHATBOT_MODEL:-}
      - LLM_RESEARCH_MODEL=${LLM_RESEARCH_MODEL:-}
      - LLM_FALLBACK_ENABLED=${LLM_FALLBACK_ENABLED:-true}
    volumes:
      - ./data:/app/data
    depends_on:
      - backend
      - redis
    stop_grace_period: 30s
    restart: unless-stopped

  # Celery Beat Scheduler
  celery-beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: sh -c "rm -f /app/data/celerybeat-schedule && celery -A app.celery_app beat --loglevel=info --schedule=/app/data/celerybeat-schedule"
    environment:
      - TZ=${CELERY_TIMEZONE:-America/New_York}
      - CELERY_TIMEZONE=${CELERY_TIMEZONE:-America/New_York}
      - DATABASE_URL=sqlite:////app/data/stockscanner.db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      # XUI Twitter ingestion
      - XUI_ENABLED=${XUI_ENABLED:-true}
      - XUI_CONFIG_PATH=${XUI_CONFIG_PATH:-/app/data/xui-reader/config.toml}
      - XUI_PROFILE=${XUI_PROFILE:-default}
      - XUI_LIMIT_PER_SOURCE=${XUI_LIMIT_PER_SOURCE:-50}
      - XUI_NEW_ONLY=${XUI_NEW_ONLY:-true}
      - XUI_CHECKPOINT_MODE=${XUI_CHECKPOINT_MODE:-auto}
      - TWITTER_REQUEST_DELAY=${TWITTER_REQUEST_DELAY:-5.0}
    volumes:
      - ./data:/app/data
    depends_on:
      - backend
      - redis
    stop_grace_period: 15s
    restart: unless-stopped

  # SQLite backup - daily safe copy via .backup API (no corruption risk)
  db-backup:
    image: alpine:3.19
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache sqlite && \
        is_valid_backup() {
          [ -f "$$1" ] && [ "$$(sqlite3 "$$1" "PRAGMA integrity_check;" 2>/dev/null)" = "ok" ]
        } && \
        prune_backups() {
          KEEP_PATH="$$1"
          mkdir -p /app/data/backups
          find /app/data/backups -maxdepth 1 -type f \
            \( -name 'stockscanner_*.db' -o -name 'stockscanner_*.db-journal' -o -name '.stockscanner_backup_in_progress.db' \) \
            ! -path "$$KEEP_PATH" \
            -exec rm -f {} +
        } && \
        EXISTING_KEEP="" && \
        for CANDIDATE in $$(ls -1t /app/data/backups/stockscanner_*.db 2>/dev/null); do \
          if is_valid_backup "$$CANDIDATE"; then \
            EXISTING_KEEP="$$CANDIDATE"; \
            break; \
          fi; \
        done && \
        if [ -n "$$EXISTING_KEEP" ]; then \
          prune_backups "$$EXISTING_KEEP"; \
          echo "Retained existing valid backup: $$EXISTING_KEEP"; \
        fi && \
        echo "Backup service started. Running every 24h." && \
        sleep 300 && \
        while true; do
          mkdir -p /app/data/backups
          TMP_DEST="/app/data/backups/.stockscanner_backup_in_progress.db"
          DEST="/app/data/backups/stockscanner_$$(date +%Y%m%d_%H%M%S).db"
          rm -f "$$TMP_DEST"
          sqlite3 /app/data/stockscanner.db ".backup '$$TMP_DEST'" 2>&1
          if [ $$? -eq 0 ] && is_valid_backup "$$TMP_DEST"; then
            mv "$$TMP_DEST" "$$DEST"
            prune_backups "$$DEST"
            echo "$$(date): Backup OK -> $$DEST ($$(du -h $$DEST | cut -f1)); retained newest valid backup only"
          else
            rm -f "$$TMP_DEST"
            echo "$$(date): Backup FAILED or validation failed"
          fi
          sleep 86400
        done
    volumes:
      - ./data:/app/data
    depends_on:
      - backend
    restart: unless-stopped

  # Frontend (React served by nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis_data:
