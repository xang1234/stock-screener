# =============================================================================
# Docker Compose Release Override (GHCR images)
# =============================================================================
# Uses immutable images published by GitHub Actions to GitHub Container Registry.
#
# Usage:
#   scripts/docker-compose-enabled-markets.sh --env-file .env.docker \
#     -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.release.yml pull
#   scripts/docker-compose-enabled-markets.sh --env-file .env.docker \
#     -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.release.yml up -d --no-build
#
# Optional HTTPS:
#   scripts/docker-compose-enabled-markets.sh --env-file .env.docker \
#     -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.release.yml -f docker-compose.https.yml pull
#   scripts/docker-compose-enabled-markets.sh --env-file .env.docker \
#     -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.release.yml -f docker-compose.https.yml up -d --no-build
#
# Requires .env.docker to define:
#   - BACKEND_IMAGE=ghcr.io/<owner>/stockscreenclaude-backend
#   - FRONTEND_IMAGE=ghcr.io/<owner>/stockscreenclaude-frontend
#   - APP_IMAGE_TAG=vX.Y.Z (or a branch / sha tag)
#
# =============================================================================

x-backend-release-service: &backend-release-service
  image: ${BACKEND_IMAGE:?set BACKEND_IMAGE}:${APP_IMAGE_TAG:?set APP_IMAGE_TAG}
  pull_policy: always

x-frontend-release-service: &frontend-release-service
  image: ${FRONTEND_IMAGE:?set FRONTEND_IMAGE}:${APP_IMAGE_TAG:?set APP_IMAGE_TAG}
  pull_policy: always

