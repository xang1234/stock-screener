name: Static Site

on:
  schedule:
    - cron: '10 16 * * 1-6'
      timezone: 'America/New_York'
  workflow_dispatch:

concurrency:
  group: static-site-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: write
  contents: write
  pages: write
  id-token: write

jobs:
  ensure_daily_price_release:
    if: ${{ github.event_name == 'workflow_dispatch' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    runs-on: ubuntu-latest
    steps:
      - name: Ensure daily price release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view daily-price-data \
            --repo "${{ github.repository }}" >/dev/null 2>&1 || \
          gh release create daily-price-data \
            --repo "${{ github.repository }}" \
            --title "Daily Price Data" \
            --notes "Automated daily market-scoped OHLCV bundles for runtime bootstrap and refresh."

  build-market:
    if: ${{ github.event_name == 'workflow_dispatch' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    needs: ensure_daily_price_release
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        market: [US, HK, JP, TW]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: stockscanner
          POSTGRES_USER: stockscanner
          POSTGRES_PASSWORD: stockscanner
        options: >-
          --health-cmd "pg_isready -U stockscanner -d stockscanner"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      REDIS_ENABLED: "false"
      DATABASE_URL: postgresql://stockscanner:stockscanner@localhost:5432/stockscanner

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Select weekly reference manifest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/weekly-reference
          MARKET_LOWER="$(echo "${{ matrix.market }}" | tr '[:upper:]' '[:lower:]')"
          echo "MARKET_LOWER=${MARKET_LOWER}" >> "$GITHUB_ENV"
          MARKET_MANIFEST="weekly-reference-latest-${MARKET_LOWER}.json"
          LEGACY_MANIFEST="weekly-reference-latest.json"

          retry_download() {
            asset_name="$1"
            for attempt in 1 2 3; do
              rm -f "/tmp/weekly-reference/${asset_name}"
              if gh release download weekly-reference-data \
                --pattern "${asset_name}" \
                --dir /tmp/weekly-reference >/dev/null 2>&1; then
                return 0
              fi
              if [ "$attempt" -lt 3 ]; then
                sleep $((attempt * 5))
              fi
            done
            return 1
          }

          retry_list_assets() {
            for attempt in 1 2 3; do
              if gh release view weekly-reference-data --json assets --jq '.assets[].name'; then
                return 0
              fi
              if [ "$attempt" -lt 3 ]; then
                sleep $((attempt * 5))
              fi
            done
            return 1
          }

          ASSET_NAMES="$(retry_list_assets)"

          if printf '%s\n' "${ASSET_NAMES}" | grep -Fxq "${MARKET_MANIFEST}"; then
            retry_download "${MARKET_MANIFEST}"
            echo "WEEKLY_REFERENCE_MODE=market_scoped" >> "$GITHUB_ENV"
            echo "WEEKLY_REFERENCE_MANIFEST=/tmp/weekly-reference/${MARKET_MANIFEST}" >> "$GITHUB_ENV"
          elif printf '%s\n' "${ASSET_NAMES}" | grep -Fxq "${LEGACY_MANIFEST}"; then
            retry_download "${LEGACY_MANIFEST}"
            echo "WEEKLY_REFERENCE_MODE=legacy" >> "$GITHUB_ENV"
            echo "WEEKLY_REFERENCE_MANIFEST=/tmp/weekly-reference/${LEGACY_MANIFEST}" >> "$GITHUB_ENV"
          else
            echo "No weekly reference manifest found for ${MARKET_LOWER} and no legacy fallback is available." >&2
            exit 1
          fi

      - name: Download weekly reference bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          retry_download() {
            asset_name="$1"
            for attempt in 1 2 3; do
              rm -f "/tmp/weekly-reference/${asset_name}"
              if gh release download weekly-reference-data \
                --pattern "${asset_name}" \
                --dir /tmp/weekly-reference >/dev/null 2>&1; then
                return 0
              fi
              if [ "$attempt" -lt 3 ]; then
                sleep $((attempt * 5))
              fi
            done
            return 1
          }

          export BUNDLE_ASSET_NAME="$(python - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest = json.loads(Path(os.environ["WEEKLY_REFERENCE_MANIFEST"]).read_text(encoding="utf-8"))
          print(manifest["bundle_asset_name"])
          PY
          )"
          export BUNDLE_SHA256="$(python - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest = json.loads(Path(os.environ["WEEKLY_REFERENCE_MANIFEST"]).read_text(encoding="utf-8"))
          print(manifest["sha256"])
          PY
          )"

          retry_download "$BUNDLE_ASSET_NAME"

          python - <<'PY'
          import hashlib
          import os
          from pathlib import Path

          bundle_path = Path("/tmp/weekly-reference") / os.environ["BUNDLE_ASSET_NAME"]
          digest = hashlib.sha256(bundle_path.read_bytes()).hexdigest()
          expected = os.environ["BUNDLE_SHA256"]
          if digest != expected:
              raise SystemExit(
                  f"Weekly reference bundle checksum mismatch for {bundle_path.name}: "
                  f"{digest} != {expected}"
              )
          print(bundle_path)
          PY

          echo "WEEKLY_REFERENCE_BUNDLE=/tmp/weekly-reference/${BUNDLE_ASSET_NAME}" >> "$GITHUB_ENV"

      - name: Import weekly reference bundle
        run: |
          cd backend
          python -m app.scripts.import_weekly_reference_bundle \
            --input "${WEEKLY_REFERENCE_BUNDLE}"

      - name: Load tracked IBD industry seed
        run: |
          cd backend
          python -m app.scripts.load_ibd_industry_groups \
            --csv ../data/IBD_industry_group.csv

      - name: Export market static data bundle
        run: |
          cd backend
          python -m app.scripts.export_static_site \
            --output-dir /tmp/static-data \
            --refresh-daily \
            --build-mode price_delta \
            --skip-universe-refresh \
            --skip-fundamentals-refresh \
            --market "${{ matrix.market }}"

      - name: Build daily price bundle
        run: |
          cd backend
          python -m app.scripts.build_daily_price_bundle \
            --market "${{ matrix.market }}" \
            --output-dir /tmp/daily-price

      - name: Upload daily price assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MARKET_LOWER="$(echo "${{ matrix.market }}" | tr '[:upper:]' '[:lower:]')"
          BUNDLE_PATH="$(find /tmp/daily-price -maxdepth 1 -name "daily-price-${MARKET_LOWER}-*.json.gz" | head -n 1)"
          MANIFEST_PATH="/tmp/daily-price/daily-price-latest-${MARKET_LOWER}.json"

          if [ -z "$BUNDLE_PATH" ] || [ ! -f "$MANIFEST_PATH" ]; then
            echo "Missing daily price bundle outputs" >&2
            exit 1
          fi

          gh release upload daily-price-data "$BUNDLE_PATH" --clobber
          gh release upload daily-price-data "$MANIFEST_PATH" --clobber

      - name: Upload market artifact
        uses: actions/upload-artifact@v4
        with:
          name: static-market-${{ matrix.market }}
          path: /tmp/static-data/markets/${{ env.MARKET_LOWER }}
          if-no-files-found: error

  combine-and-build:
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch)) }}
    needs: build-market
    runs-on: ubuntu-latest
    env:
      REDIS_ENABLED: "false"
      DATABASE_URL: postgresql://stockscanner:stockscanner@localhost:5432/stockscanner

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Download market artifacts
        id: download-market-artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: static-market-*
          path: /tmp/static-market-artifacts
          merge-multiple: false

      - name: Validate market artifacts
        run: |
          mkdir -p /tmp/static-market-artifacts
          find /tmp/static-market-artifacts -type f -name 'manifest.market.json'
          if ! find /tmp/static-market-artifacts -type f -name 'manifest.market.json' | grep -q .; then
            echo "No market artifacts were produced by the matrix build." >&2
            exit 1
          fi

      - name: Combine static data bundle
        run: |
          cd backend
          python -m app.scripts.export_static_site \
            --output-dir ../frontend/public/static-data \
            --combine-artifacts-dir /tmp/static-market-artifacts

      - name: Build static frontend
        env:
          VITE_STATIC_SITE: "true"
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: cd frontend && npm run build

      - name: Upload Pages artifact
        id: upload-pages-artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: frontend/dist

      - name: Prune duplicate Pages artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          KEEP_ARTIFACT_ID: ${{ steps.upload-pages-artifact.outputs.artifact_id }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess

          repo = os.environ["REPOSITORY"]
          run_id = os.environ["RUN_ID"]
          keep_artifact_id = int(os.environ["KEEP_ARTIFACT_ID"])

          result = subprocess.run(
              [
                  "gh",
                  "api",
                  "--paginate",
                  "--slurp",
                  f"repos/{repo}/actions/runs/{run_id}/artifacts?per_page=100",
              ],
              check=True,
              capture_output=True,
              text=True,
          )
          pages = json.loads(result.stdout)
          payload = {
              "artifacts": [
                  artifact
                  for page in pages
                  for artifact in page.get("artifacts", [])
              ]
          }
          duplicates = [
              artifact["id"]
              for artifact in payload.get("artifacts", [])
              if artifact.get("name") == "github-pages" and artifact.get("id") != keep_artifact_id
          ]

          if not duplicates:
              print("No duplicate github-pages artifacts found.", flush=True)
              raise SystemExit(0)

          print(
              f"::warning::Pruning {len(duplicates)} duplicate github-pages artifact(s) "
              f"from run {run_id}; keeping {keep_artifact_id}.",
              flush=True,
          )
          for artifact_id in duplicates:
              subprocess.run(
                  ["gh", "api", "--method", "DELETE", f"repos/{repo}/actions/artifacts/{artifact_id}"],
                  check=True,
              )
              print(f"Deleted duplicate github-pages artifact {artifact_id}.", flush=True)
          PY

  deploy:
    if: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    needs: combine-and-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
