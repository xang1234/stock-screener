name: Static Site

on:
  schedule:
    - cron: '10 20 * * 1-5'
    - cron: '10 21 * * 1-5'
  workflow_dispatch:

concurrency:
  group: static-site-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    runs-on: ubuntu-latest
    env:
      REDIS_ENABLED: "false"
    outputs:
      should_deploy: ${{ steps.schedule_guard.outputs.should_run }}

    steps:
      - name: Resolve schedule slot
        id: schedule_guard
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch: running workflow."
            exit 0
          fi

          ny_day="$(TZ=America/New_York date +%u)"
          ny_time="$(TZ=America/New_York date +%H:%M)"

          if [ "$ny_day" -ge 1 ] && [ "$ny_day" -le 5 ] && [ "$ny_time" = "16:10" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Scheduled slot matches 4:10 PM America/New_York."
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping inactive schedule slot. New York local time: $ny_day $ny_time."
          fi

      - uses: actions/checkout@v4
        if: ${{ steps.schedule_guard.outputs.should_run == 'true' }}

      - uses: actions/setup-python@v5
        if: ${{ steps.schedule_guard.outputs.should_run == 'true' }}
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - uses: actions/setup-node@v4
        if: ${{ steps.schedule_guard.outputs.should_run == 'true' }}
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/configure-pages@v5
        if: ${{ steps.schedule_guard.outputs.should_run == 'true' }}
        with:
          enablement: true

      - name: Install backend dependencies
        if: ${{ steps.schedule_guard.outputs.should_run == 'true' }}
        run: pip install -r backend/requirements.txt

      - name: Download weekly reference manifest
        if: ${{ steps.schedule_guard.outputs.should_run == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/weekly-reference
          gh release download weekly-reference-data \
            --pattern weekly-reference-latest.json \
            --dir /tmp/weekly-reference

      - name: Download weekly reference bundle
        if: ${{ steps.schedule_guard.outputs.should_run == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BUNDLE_ASSET_NAME="$(python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path("/tmp/weekly-reference/weekly-reference-latest.json").read_text(encoding="utf-8"))
          print(manifest["bundle_asset_name"])
          PY
          )"
          BUNDLE_SHA256="$(python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path("/tmp/weekly-reference/weekly-reference-latest.json").read_text(encoding="utf-8"))
          print(manifest["sha256"])
          PY
          )"
          export BUNDLE_ASSET_NAME
          export BUNDLE_SHA256
          echo "BUNDLE_ASSET_NAME=$BUNDLE_ASSET_NAME" >> "$GITHUB_ENV"
          echo "BUNDLE_SHA256=$BUNDLE_SHA256" >> "$GITHUB_ENV"

          gh release download weekly-reference-data \
            --pattern "$BUNDLE_ASSET_NAME" \
            --dir /tmp/weekly-reference

          python - <<'PY'
          import hashlib
          import os
          from pathlib import Path

          bundle_path = Path("/tmp/weekly-reference") / os.environ["BUNDLE_ASSET_NAME"]
          digest = hashlib.sha256(bundle_path.read_bytes()).hexdigest()
          expected = os.environ["BUNDLE_SHA256"]
          if digest != expected:
              raise SystemExit(
                  f"Weekly reference bundle checksum mismatch for {bundle_path.name}: "
                  f"{digest} != {expected}"
              )
          PY

      - name: Import weekly reference bundle
        if: ${{ steps.schedule_guard.outputs.should_run == 'true' }}
        run: |
          cd backend
          python -m app.scripts.import_weekly_reference_bundle \
            --input "/tmp/weekly-reference/${BUNDLE_ASSET_NAME}"

      - name: Load tracked IBD industry seed
        if: ${{ steps.schedule_guard.outputs.should_run == 'true' }}
        run: |
          cd backend
          python -m app.scripts.load_ibd_industry_groups \
            --csv ../data/IBD_industry_group.csv

      - name: Install frontend dependencies
        if: ${{ steps.schedule_guard.outputs.should_run == 'true' }}
        run: cd frontend && npm ci

      - name: Export static data bundle
        if: ${{ steps.schedule_guard.outputs.should_run == 'true' }}
        run: |
          cd backend
          python -m app.scripts.export_static_site \
            --output-dir ../frontend/public/static-data \
            --refresh-daily \
            --skip-universe-refresh \
            --skip-fundamentals-refresh \
            --hydrate-published-snapshot

      - name: Build static frontend
        if: ${{ steps.schedule_guard.outputs.should_run == 'true' }}
        env:
          VITE_STATIC_SITE: "true"
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: cd frontend && npm run build

      - name: Upload Pages artifact
        if: ${{ steps.schedule_guard.outputs.should_run == 'true' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    if: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && needs.build.outputs.should_deploy == 'true' }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
