name: Static Site

on:
  schedule:
    - cron: '10 16 * * 1-6'
      timezone: 'America/New_York'
  workflow_dispatch:

concurrency:
  group: static-site-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-market:
    if: ${{ github.event_name == 'workflow_dispatch' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        market: [US, HK, JP, TW]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: stockscanner
          POSTGRES_USER: stockscanner
          POSTGRES_PASSWORD: stockscanner
        options: >-
          --health-cmd "pg_isready -U stockscanner -d stockscanner"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      REDIS_ENABLED: "false"
      DATABASE_URL: postgresql://stockscanner:stockscanner@localhost:5432/stockscanner

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Select weekly reference manifest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/weekly-reference
          MARKET_LOWER="$(echo "${{ matrix.market }}" | tr '[:upper:]' '[:lower:]')"
          echo "MARKET_LOWER=${MARKET_LOWER}" >> "$GITHUB_ENV"

          if gh release download weekly-reference-data \
            --pattern "weekly-reference-latest-${MARKET_LOWER}.json" \
            --dir /tmp/weekly-reference >/dev/null 2>&1; then
            echo "WEEKLY_REFERENCE_MODE=market_scoped" >> "$GITHUB_ENV"
            echo "WEEKLY_REFERENCE_MANIFEST=/tmp/weekly-reference/weekly-reference-latest-${MARKET_LOWER}.json" >> "$GITHUB_ENV"
          else
            gh release download weekly-reference-data \
              --pattern "weekly-reference-latest.json" \
              --dir /tmp/weekly-reference
            echo "WEEKLY_REFERENCE_MODE=legacy" >> "$GITHUB_ENV"
            echo "WEEKLY_REFERENCE_MANIFEST=/tmp/weekly-reference/weekly-reference-latest.json" >> "$GITHUB_ENV"
          fi

      - name: Download weekly reference bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          export BUNDLE_ASSET_NAME="$(python - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest = json.loads(Path(os.environ["WEEKLY_REFERENCE_MANIFEST"]).read_text(encoding="utf-8"))
          print(manifest["bundle_asset_name"])
          PY
          )"
          export BUNDLE_SHA256="$(python - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest = json.loads(Path(os.environ["WEEKLY_REFERENCE_MANIFEST"]).read_text(encoding="utf-8"))
          print(manifest["sha256"])
          PY
          )"

          gh release download weekly-reference-data \
            --pattern "$BUNDLE_ASSET_NAME" \
            --dir /tmp/weekly-reference

          python - <<'PY'
          import hashlib
          import os
          from pathlib import Path

          bundle_path = Path("/tmp/weekly-reference") / os.environ["BUNDLE_ASSET_NAME"]
          digest = hashlib.sha256(bundle_path.read_bytes()).hexdigest()
          expected = os.environ["BUNDLE_SHA256"]
          if digest != expected:
              raise SystemExit(
                  f"Weekly reference bundle checksum mismatch for {bundle_path.name}: "
                  f"{digest} != {expected}"
              )
          print(bundle_path)
          PY

          echo "WEEKLY_REFERENCE_BUNDLE=/tmp/weekly-reference/${BUNDLE_ASSET_NAME}" >> "$GITHUB_ENV"

      - name: Import weekly reference bundle
        run: |
          cd backend
          python -m app.scripts.import_weekly_reference_bundle \
            --input "${WEEKLY_REFERENCE_BUNDLE}"

      - name: Load tracked IBD industry seed
        run: |
          cd backend
          python -m app.scripts.load_ibd_industry_groups \
            --csv ../data/IBD_industry_group.csv

      - name: Export market static data bundle
        run: |
          cd backend
          python -m app.scripts.export_static_site \
            --output-dir /tmp/static-data \
            --refresh-daily \
            --build-mode price_delta \
            --skip-universe-refresh \
            --skip-fundamentals-refresh \
            --market "${{ matrix.market }}"

      - name: Upload market artifact
        uses: actions/upload-artifact@v4
        with:
          name: static-market-${{ matrix.market }}
          path: /tmp/static-data/markets/${{ env.MARKET_LOWER }}
          if-no-files-found: error

  combine-and-build:
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch)) }}
    needs: build-market
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Download market artifacts
        id: download-market-artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: static-market-*
          path: /tmp/static-market-artifacts
          merge-multiple: false

      - name: Validate market artifacts
        run: |
          mkdir -p /tmp/static-market-artifacts
          find /tmp/static-market-artifacts -type f -name 'manifest.market.json'
          if ! find /tmp/static-market-artifacts -type f -name 'manifest.market.json' | grep -q .; then
            echo "No market artifacts were produced by the matrix build." >&2
            exit 1
          fi

      - name: Combine static data bundle
        run: |
          cd backend
          python -m app.scripts.export_static_site \
            --output-dir ../frontend/public/static-data \
            --combine-artifacts-dir /tmp/static-market-artifacts

      - name: Build static frontend
        env:
          VITE_STATIC_SITE: "true"
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: cd frontend && npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    if: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    needs: combine-and-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
