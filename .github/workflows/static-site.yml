name: Static Site

on:
  schedule:
    # US/EU/Americas group — 4:10pm ET, after US close. Uses the New York
    # timezone so it tracks DST automatically.
    - cron: '10 16 * * 1-6'
      timezone: 'America/New_York'
    # Asian group — 6:30pm SGT, after all Asian markets close (incl. India,
    # which closes 3:30pm IST = 6:00pm SGT; the 30-min buffer lets prices
    # settle). Singapore has no DST, so 6:30pm SGT == 10:30 UTC year-round.
    - cron: '30 10 * * 1-5'
  workflow_dispatch:
    inputs:
      market_group:
        description: 'Which market group to build'
        type: choice
        default: all
        options:
          - all
          - asia
          - us
      rs_formula_overrides:
        description: 'Optional per-market RS rollback JSON, e.g. {"HK":"legacy-linear-v1"}; all others use balanced-horizon-percentile-v2'
        type: string
        default: '{}'

concurrency:
  group: static-site-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: write
  contents: write
  pages: write
  id-token: write

jobs:
  select-markets:
    if: ${{ github.event_name == 'workflow_dispatch' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    runs-on: ubuntu-latest
    outputs:
      markets: ${{ steps.pick.outputs.markets }}
    steps:
      # Resolve which markets this run builds. The schedule that fired
      # (github.event.schedule) selects the group; manual dispatch uses the
      # market_group input. The combine job back-fills every market that is NOT
      # built here from the last good artifact of a previous run, so a partial
      # group still publishes a complete site.
      - id: pick
        env:
          EVENT_NAME: ${{ github.event_name }}
          SCHEDULE: ${{ github.event.schedule }}
          MARKET_GROUP: ${{ github.event.inputs.market_group }}
        run: |
          ASIA='["HK","IN","JP","KR","TW","CN","SG","MY","AU"]'
          US='["US","CA","DE"]'
          ALL='["US","HK","IN","JP","KR","TW","CN","CA","DE","SG","AU","MY"]'

          if [ "$EVENT_NAME" = "schedule" ]; then
            case "$SCHEDULE" in
              '30 10 * * 1-5') markets="$ASIA" ;;   # 10:30 UTC = 6:30pm SGT
              *)               markets="$US" ;;     # 4:10pm ET (America/New_York)
            esac
          else
            case "$MARKET_GROUP" in
              asia) markets="$ASIA" ;;
              us)   markets="$US" ;;
              *)    markets="$ALL" ;;
            esac
          fi

          echo "markets=$markets" >> "$GITHUB_OUTPUT"
          echo "Building markets: $markets"

  ensure_daily_price_release:
    if: ${{ github.event_name == 'workflow_dispatch' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    runs-on: ubuntu-latest
    steps:
      - name: Ensure static data releases exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view daily-price-data \
            --repo "${{ github.repository }}" >/dev/null 2>&1 || \
          gh release create daily-price-data \
            --repo "${{ github.repository }}" \
            --title "Daily Price Data" \
            --notes "Automated daily market-scoped OHLCV bundles for runtime bootstrap and refresh."
          gh release view rrg-history-data \
            --repo "${{ github.repository }}" >/dev/null 2>&1 || \
          gh release create rrg-history-data \
            --repo "${{ github.repository }}" \
            --title "RRG History Data" \
            --notes "Rolling compact weekly group-rank history for static RRG builds."

  build-market:
    if: ${{ github.event_name == 'workflow_dispatch' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    needs: [select-markets, ensure_daily_price_release]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        market: ${{ fromJSON(needs.select-markets.outputs.markets) }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: stockscanner
          POSTGRES_USER: stockscanner
          POSTGRES_PASSWORD: stockscanner
        options: >-
          --health-cmd "pg_isready -U stockscanner -d stockscanner"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      REDIS_ENABLED: "false"
      DATABASE_URL: postgresql://stockscanner:stockscanner@localhost:5432/stockscanner
      # IN-specific yfinance throttle: smaller batches + 10s between batches to
      # stay under Yahoo's 429 window for the ~4.4k IN universe. Other markets
      # ignore these (the policy looks up settings.<provider>_<key>_<market>).
      YFINANCE_BATCH_SIZE_IN: "25"
      YFINANCE_BATCH_RATE_LIMIT_IN: "0.1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Import weekly reference bundle
        env:
          GITHUB_DATA_TOKEN: ${{ github.token }}
        run: |
          cd backend
          python -m app.scripts.sync_weekly_reference_from_github \
            --market "${{ matrix.market }}" \
            --allow-stale

      - name: Load tracked IBD industry seed
        run: |
          cd backend
          python -m app.scripts.load_ibd_industry_groups \
            --csv ../data/IBD_industry_group.csv

      # Fills IBD groups for symbols/markets the curated CSV doesn't cover (new
      # listings, non-US markets) without overwriting CSV/manual rows. Additive
      # and non-fatal: if the classification release isn't published yet, the
      # build proceeds with CSV-only coverage.
      - name: Apply IBD classification (fills gaps beyond the CSV seed)
        continue-on-error: true
        env:
          GITHUB_DATA_TOKEN: ${{ github.token }}
        run: |
          cd backend
          python -m app.scripts.sync_ibd_classification_from_github \
            --market "${{ matrix.market }}" \
            --allow-stale

      - name: Seed daily price bundle from GitHub
        env:
          GITHUB_DATA_TOKEN: ${{ github.token }}
        run: |
          cd backend
          python -m app.scripts.sync_daily_price_bundle_from_github \
            --market "${{ matrix.market }}" \
            --allow-stale

      - name: Plan rolling RRG history
        id: rrg-history
        run: |
          mkdir -p /tmp/rrg-history
          MARKET_LOWER="$(echo "${{ matrix.market }}" | tr '[:upper:]' '[:lower:]')"
          echo "MARKET_LOWER=${MARKET_LOWER}" >> "$GITHUB_ENV"
          cd backend
          PLAN="$(python -m app.scripts.describe_static_rrg_history \
            --market "${{ matrix.market }}" \
            --directory /tmp/rrg-history)"
          echo "enabled=$(jq -r '.enabled' <<<"$PLAN")" >> "$GITHUB_OUTPUT"
          echo "asset_name=$(jq -r '.asset_name' <<<"$PLAN")" >> "$GITHUB_OUTPUT"
          echo "source_path=$(jq -r '.source_path' <<<"$PLAN")" >> "$GITHUB_OUTPUT"
          echo "output_path=$(jq -r '.output_path' <<<"$PLAN")" >> "$GITHUB_OUTPUT"
          echo "RRG_HISTORY_DIR=/tmp/rrg-history" >> "$GITHUB_ENV"

      - name: Restore rolling RRG history
        id: restore-rrg-history
        if: ${{ steps.rrg-history.outputs.enabled == 'true' }}
        env:
          GITHUB_DATA_TOKEN: ${{ github.token }}
          ASSET_NAME: ${{ steps.rrg-history.outputs.asset_name }}
          SOURCE_PATH: ${{ steps.rrg-history.outputs.source_path }}
        run: |
          rm -f "$SOURCE_PATH"
          cd backend
          RESTORE_RESULT="$(python -m app.scripts.restore_static_rrg_history \
            --repository "${{ github.repository }}" \
            --asset-name "$ASSET_NAME" \
            --output-path "$SOURCE_PATH" || true)"
          SAFE_TO_PUBLISH="$(jq -r '.safe_to_publish // false' <<<"$RESTORE_RESULT" 2>/dev/null || echo false)"
          RESTORE_STATUS="$(jq -r '.status // "failed"' <<<"$RESTORE_RESULT" 2>/dev/null || echo failed)"
          [ "$SAFE_TO_PUBLISH" = "true" ] || SAFE_TO_PUBLISH=false
          echo "safe_to_publish=$SAFE_TO_PUBLISH" >> "$GITHUB_OUTPUT"
          echo "restore_status=$RESTORE_STATUS" >> "$GITHUB_OUTPUT"
          if [ "$RESTORE_STATUS" = "restored" ]; then
            echo "Restored rolling RRG history for ${{ matrix.market }}."
          elif [ "$RESTORE_STATUS" = "missing" ]; then
            echo "No rolling RRG history found for ${{ matrix.market }}; the static exporter will bootstrap it."
          else
            echo "Unable to restore rolling RRG history for ${{ matrix.market }}; history publication will be skipped." >&2
          fi

      - name: Export market static data bundle
        id: export-market
        env:
          RS_FORMULA_OVERRIDES: ${{ github.event.inputs.rs_formula_overrides || '{}' }}
        run: |
          cd backend
          set +e
          python -m app.scripts.export_static_site \
            --output-dir /tmp/static-data \
            --refresh-daily \
            --build-mode price_delta \
            --skip-universe-refresh \
            --skip-fundamentals-refresh \
            --market "${{ matrix.market }}" \
            --rs-formula-overrides-json "$RS_FORMULA_OVERRIDES" \
            --rrg-history-dir "$RRG_HISTORY_DIR"
          status=$?
          set -e
          if [ "$status" -eq 78 ]; then
            echo "Market ${{ matrix.market }} is not a trading day; no current static artifact will be uploaded."
            echo "has_artifact=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$status" -eq 79 ]; then
            echo "Market ${{ matrix.market }} produced diagnostics but no current market artifact will be uploaded; combine will use fallback artifacts if available."
            echo "has_artifact=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$status" -ne 0 ]; then
            exit "$status"
          fi
          echo "has_artifact=true" >> "$GITHUB_OUTPUT"

      - name: Upload market diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: static-market-diagnostics-${{ matrix.market }}
          path: /tmp/static-data/diagnostics/${{ env.MARKET_LOWER }}
          if-no-files-found: ignore

      - name: Build daily price bundle
        if: ${{ steps.export-market.outputs.has_artifact == 'true' }}
        run: |
          cd backend
          python -m app.scripts.build_daily_price_bundle \
            --market "${{ matrix.market }}" \
            --output-dir /tmp/daily-price

      - name: Upload daily price assets
        if: ${{ steps.export-market.outputs.has_artifact == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MARKET_LOWER="$(echo "${{ matrix.market }}" | tr '[:upper:]' '[:lower:]')"
          BUNDLE_PATH="$(find /tmp/daily-price -maxdepth 1 -name "daily-price-${MARKET_LOWER}-*.json.gz" | head -n 1)"
          MANIFEST_PATH="/tmp/daily-price/daily-price-latest-${MARKET_LOWER}.json"

          if [ -z "$BUNDLE_PATH" ] || [ ! -f "$MANIFEST_PATH" ]; then
            echo "Missing daily price bundle outputs" >&2
            exit 1
          fi

          gh release upload daily-price-data "$BUNDLE_PATH" --clobber
          gh release upload daily-price-data "$MANIFEST_PATH" --clobber

      - name: Upload market artifact
        if: ${{ steps.export-market.outputs.has_artifact == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: static-market-${{ matrix.market }}
          path: /tmp/static-data/markets/${{ env.MARKET_LOWER }}
          if-no-files-found: error

      - name: Publish rolling RRG history
        if: ${{ steps.export-market.outputs.has_artifact == 'true' && steps.rrg-history.outputs.enabled == 'true' && steps.restore-rrg-history.outputs.safe_to_publish == 'true' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          HISTORY_PATH: ${{ steps.rrg-history.outputs.output_path }}
        run: |
          if [ ! -s "$HISTORY_PATH" ]; then
            echo "No current rolling RRG history was produced; market publication remains valid."
            exit 0
          fi
          for attempt in 1 2 3; do
            if gh release upload rrg-history-data "$HISTORY_PATH" --clobber; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              sleep $((attempt * 5))
            fi
          done
          echo "Unable to advance rolling RRG history; the market artifact was already uploaded." >&2
          exit 1

  combine-and-build:
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch)) }}
    needs: build-market
    runs-on: ubuntu-latest
    env:
      REDIS_ENABLED: "false"
      DATABASE_URL: postgresql://stockscanner:stockscanner@localhost:5432/stockscanner

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Download current market artifacts
        id: download-market-artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: static-market-*
          path: /tmp/static-market-artifacts-current
          merge-multiple: false

      - name: Download per-market fallback artifacts
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          CURRENT_RUN_ID: ${{ github.run_id }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import json
          import os
          import shutil
          import subprocess
          from pathlib import Path
          from urllib.parse import urlencode

          repo = os.environ["REPOSITORY"]
          current_run_id = int(os.environ["CURRENT_RUN_ID"])
          branch_name = os.environ["BRANCH_NAME"]
          current_dir = Path("/tmp/static-market-artifacts-current")
          fallback_dir = Path("/tmp/static-market-artifacts-fallback")
          fallback_dir.mkdir(parents=True, exist_ok=True)
          query = urlencode(
              {
                  "branch": branch_name,
                  "status": "completed",
                  "per_page": "100",
              }
          )

          def warn(message):
              print(
                  f"::warning::Unable to download fallback market artifact: {message}",
                  flush=True,
              )

          def command_error_detail(exc, limit=800):
              details = []
              for stream_name, stream_value in (("stderr", exc.stderr), ("stdout", exc.stdout)):
                  text = (stream_value or "").strip()
                  if not text:
                      continue
                  text = " | ".join(text.splitlines())
                  if len(text) > limit:
                      text = f"{text[:limit]}..."
                  details.append(f"{stream_name}: {text}")
              return f" Details: {'; '.join(details)}" if details else ""

          def market_from_artifact_name(artifact_name):
              prefix = "static-market-"
              if not artifact_name.startswith(prefix):
                  return ""
              return artifact_name[len(prefix):].upper()

          def extract_runs(payload):
              if isinstance(payload, dict):
                  workflow_runs = payload.get("workflow_runs")
                  if not isinstance(workflow_runs, list):
                      raise ValueError(
                          "Unexpected GitHub API response shape: workflow_runs is not a list."
                      )
                  return [run for run in workflow_runs if isinstance(run, dict)]

              if isinstance(payload, list):
                  runs = []
                  for page in payload:
                      if not isinstance(page, dict):
                          raise ValueError(
                              "Unexpected GitHub API response shape: page is not an object."
                          )
                      workflow_runs = page.get("workflow_runs", [])
                      if not isinstance(workflow_runs, list):
                          raise ValueError(
                              "Unexpected GitHub API response shape: workflow_runs is not a list."
                          )
                      runs.extend(run for run in workflow_runs if isinstance(run, dict))
                  return runs

              raise ValueError(
                  "Unexpected GitHub API response shape: response is not an object or list."
              )

          def collect_current_markets():
              current_markets = set()
              metadata_paths = (
                  sorted(current_dir.rglob("manifest.market.json"))
                  if current_dir.exists()
                  else []
              )
              for metadata_path in metadata_paths:
                  try:
                      payload = json.loads(metadata_path.read_text(encoding="utf-8"))
                      market = str(payload.get("market", "")).upper()
                  except (OSError, json.JSONDecodeError, TypeError) as exc:
                      warn(f"Current artifact metadata at {metadata_path} could not be read ({exc}).")
                      continue
                  if market:
                      current_markets.add(market)
              return current_markets

          def extract_artifacts(payload):
              if isinstance(payload, dict):
                  artifacts = payload.get("artifacts")
                  if not isinstance(artifacts, list):
                      raise ValueError(
                          "Unexpected GitHub API response shape: artifacts is not a list."
                      )
                  return [artifact for artifact in artifacts if isinstance(artifact, dict)]

              if isinstance(payload, list):
                  artifacts = []
                  for page in payload:
                      if not isinstance(page, dict):
                          raise ValueError(
                              "Unexpected GitHub API response shape: page is not an object."
                          )
                      page_artifacts = page.get("artifacts", [])
                      if not isinstance(page_artifacts, list):
                          raise ValueError(
                              "Unexpected GitHub API response shape: artifacts is not a list."
                          )
                      artifacts.extend(
                          artifact for artifact in page_artifacts if isinstance(artifact, dict)
                      )
                  return artifacts

              raise ValueError(
                  "Unexpected GitHub API response shape: response is not an object or list."
              )

          def gh_json(args):
              result = subprocess.run(
                  ["gh", *args],
                  check=True,
                  capture_output=True,
                  text=True,
              )
              return json.loads(result.stdout)

          try:
              pages = gh_json(
                  [
                      "api",
                      "--paginate",
                      "--slurp",
                      f"repos/{repo}/actions/workflows/static-site.yml/runs?{query}",
                  ]
              )
              runs = extract_runs(pages)
          except subprocess.CalledProcessError as exc:
              warn(
                  "GitHub workflow runs API request failed "
                  f"with exit {exc.returncode}.{command_error_detail(exc)}"
              )
              runs = []
          except json.JSONDecodeError as exc:
              warn(f"GitHub workflow runs API response was not valid JSON ({exc}).")
              runs = []
          except (AttributeError, KeyError, TypeError, ValueError) as exc:
              warn(str(exc))
              runs = []

          current_markets = collect_current_markets()
          fallback_markets = set()
          if current_markets:
              print(
                  f"Current run already has market artifacts: {', '.join(sorted(current_markets))}.",
                  flush=True,
              )

          for run in runs:
              run_id = run.get("id")
              if run_id == current_run_id:
                  continue
              try:
                  artifact_pages = gh_json(
                      [
                          "api",
                          "--paginate",
                          "--slurp",
                          f"repos/{repo}/actions/runs/{run_id}/artifacts?per_page=100",
                      ]
                  )
                  artifacts = extract_artifacts(artifact_pages)
              except subprocess.CalledProcessError as exc:
                  warn(
                      f"Artifact list API request for run {run_id} failed "
                      f"with exit {exc.returncode}.{command_error_detail(exc)}"
                  )
                  continue
              except json.JSONDecodeError as exc:
                  warn(f"Artifact list API response for run {run_id} was not valid JSON ({exc}).")
                  continue
              except (AttributeError, KeyError, TypeError, ValueError) as exc:
                  warn(f"Artifact list API response for run {run_id} was invalid: {exc}")
                  continue

              artifacts_by_name = {
                  str(artifact.get("name")): artifact
                  for artifact in artifacts
                  if not artifact.get("expired")
              }

              for artifact_name in sorted(artifacts_by_name):
                  market = market_from_artifact_name(artifact_name)
                  if not market:
                      continue
                  if market in current_markets or market in fallback_markets:
                      continue

                  target_dir = fallback_dir / artifact_name
                  if target_dir.exists():
                      shutil.rmtree(target_dir)

                  try:
                      subprocess.run(
                          [
                              "gh",
                              "run",
                              "download",
                              str(run_id),
                              "--repo",
                              repo,
                              "--name",
                              artifact_name,
                              "--dir",
                              str(target_dir),
                          ],
                          check=True,
                          capture_output=True,
                          text=True,
                      )
                  except subprocess.CalledProcessError as exc:
                      warn(
                          f"{artifact_name} from run {run_id} failed to download "
                          f"with exit {exc.returncode}.{command_error_detail(exc)}"
                      )
                      continue

                  fallback_markets.add(market)
                  print(
                      f"Using fallback artifact {artifact_name} from Static Site run {run_id} on {branch_name}.",
                      flush=True,
                  )

          if fallback_markets:
              print(
                  f"Downloaded fallback market artifacts: {', '.join(sorted(fallback_markets))}.",
                  flush=True,
              )
          else:
              print(f"No fallback market artifacts found on {branch_name}.")
          PY

      - name: Validate market artifacts
        run: |
          mkdir -p /tmp/static-market-artifacts-current /tmp/static-market-artifacts-fallback
          cd backend
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          from app.domain.markets import market_registry

          # Every scheduled run builds only one market group; the rest must be
          # back-filled from a previous run's artifacts. Publishing is all-or-
          # nothing: refuse to deploy unless every supported market is present
          # across current + fallback artifacts, so a partial group run (or a
          # failed fallback download) can never ship an incomplete static site.
          expected = {code.upper() for code in market_registry.supported_market_codes()}
          present = set()
          for base in (
              "/tmp/static-market-artifacts-current",
              "/tmp/static-market-artifacts-fallback",
          ):
              for manifest in Path(base).rglob("manifest.market.json"):
                  try:
                      market = str(
                          json.loads(manifest.read_text(encoding="utf-8")).get("market", "")
                      ).upper()
                  except (OSError, json.JSONDecodeError, TypeError) as exc:
                      print(f"::warning::Could not read {manifest}: {exc}", flush=True)
                      continue
                  if market:
                      present.add(market)

          print(f"Expected markets: {', '.join(sorted(expected))}")
          print(f"Present markets:  {', '.join(sorted(present)) or '(none)'}")

          missing = sorted(expected - present)
          if missing:
              print(
                  "::error::Refusing to publish an incomplete static site. No current "
                  f"build and no fallback artifact for: {', '.join(missing)}.",
                  flush=True,
              )
              sys.exit(1)
          print("All supported markets present; static site is complete.")
          PY

      - name: Combine static data bundle
        env:
          RS_FORMULA_OVERRIDES: ${{ github.event.inputs.rs_formula_overrides || '{}' }}
        run: |
          cd backend
          python -m app.scripts.export_static_site \
            --output-dir ../frontend/public/static-data \
            --combine-artifacts-dir /tmp/static-market-artifacts-current \
            --fallback-artifacts-dir /tmp/static-market-artifacts-fallback \
            --rs-formula-overrides-json "$RS_FORMULA_OVERRIDES"

      - name: Build static frontend
        env:
          VITE_STATIC_SITE: "true"
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: cd frontend && npm run build

      - name: Upload Pages artifact
        id: upload-pages-artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: frontend/dist

      - name: Prune duplicate Pages artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          KEEP_ARTIFACT_ID: ${{ steps.upload-pages-artifact.outputs.artifact_id }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess

          repo = os.environ["REPOSITORY"]
          run_id = os.environ["RUN_ID"]
          keep_artifact_id = int(os.environ["KEEP_ARTIFACT_ID"])

          result = subprocess.run(
              [
                  "gh",
                  "api",
                  "--paginate",
                  "--slurp",
                  f"repos/{repo}/actions/runs/{run_id}/artifacts?per_page=100",
              ],
              check=True,
              capture_output=True,
              text=True,
          )
          pages = json.loads(result.stdout)
          payload = {
              "artifacts": [
                  artifact
                  for page in pages
                  for artifact in page.get("artifacts", [])
              ]
          }
          duplicates = [
              artifact["id"]
              for artifact in payload.get("artifacts", [])
              if artifact.get("name") == "github-pages" and artifact.get("id") != keep_artifact_id
          ]

          if not duplicates:
              print("No duplicate github-pages artifacts found.", flush=True)
              raise SystemExit(0)

          print(
              f"::warning::Pruning {len(duplicates)} duplicate github-pages artifact(s) "
              f"from run {run_id}; keeping {keep_artifact_id}.",
              flush=True,
          )
          for artifact_id in duplicates:
              subprocess.run(
                  ["gh", "api", "--method", "DELETE", f"repos/{repo}/actions/artifacts/{artifact_id}"],
                  check=True,
              )
              print(f"Deleted duplicate github-pages artifact {artifact_id}.", flush=True)
          PY

  deploy:
    if: ${{ always() && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && needs.combine-and-build.result == 'success' }}
    needs: combine-and-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
