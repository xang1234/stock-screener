name: CI

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Quality Gates
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci@localhost/ci_unused

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-test.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt -r backend/requirements-test.txt

      - name: Check generated scan-field contracts
        run: python scripts/generate_scan_filter_contract.py --check

      - name: "Gate 0: Theme identity invariants"
        run: make gate-identity

      - name: Gate check (verify all SE test files are assigned)
        run: make gate-check

      - name: "Gate 1: Detector correctness"
        run: make gate-1

      - name: "Gate 2: Temporal integrity"
        run: make gate-2

      - name: "Gate 3: Integration coverage"
        run: make gate-3

      - name: "Gate 4: Performance baselines"
        run: make gate-4

      - name: "Gate 5: Golden regression"
        run: make gate-5

  backend-unit:
    name: Backend Unit Suite (${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    env:
      DATABASE_URL: postgresql://ci:ci@localhost/ci_unused

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-test.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt -r backend/requirements-test.txt

      - name: Restore backend unit duration cache
        uses: actions/cache/restore@v4
        with:
          path: backend/.test_durations
          key: backend-unit-durations-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}-${{ matrix.shard }}
          restore-keys: |
            backend-unit-durations-${{ runner.os }}-${{ github.ref_name }}-
            backend-unit-durations-${{ runner.os }}-

      - name: Comprehensive backend unit suite (shard ${{ matrix.shard }}/4)
        shell: bash
        run: |
          gate_unit_file="${RUNNER_TEMP}/backend-gate-unit-files.txt"
          make gate-unit-files > "${gate_unit_file}"

          cd backend
          ignore_args=()
          while IFS= read -r path; do
            [[ -n "${path}" ]] || continue
            ignore_args+=(--ignore "${path}")
          done < "${gate_unit_file}"

          python -m pytest tests/unit \
            "${ignore_args[@]}" \
            -m "not live_service and not load" \
            --splits 4 \
            --group "${{ matrix.shard }}" \
            --splitting-algorithm least_duration \
            --durations-path .test_durations \
            --store-durations \
            -vv

      - name: Save backend unit duration cache
        if: always() && hashFiles('backend/.test_durations') != ''
        uses: actions/cache/save@v4
        with:
          path: backend/.test_durations
          key: backend-unit-durations-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}-${{ matrix.shard }}

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Lint
        run: cd frontend && npm run lint

      - name: Test
        run: cd frontend && npm run test:run

      - name: Install Playwright browser
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Smoke test
        run: cd frontend && npm run test:smoke

  assistant-compose-smoke:
    name: Assistant Compose Smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Assistant profile compose smoke
        run: bash scripts/run_docker_assistant_compose_smoke.sh

  publish-images:
    name: Publish Docker Images
    needs: [backend, backend-unit, frontend, assistant-compose-smoke]
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Normalize GHCR owner
        id: registry
        shell: bash
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend image metadata
        id: backend-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.registry.outputs.owner }}/stockscreenclaude-backend
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.backend-meta.outputs.tags }}
          labels: ${{ steps.backend-meta.outputs.labels }}
          cache-from: type=gha,scope=backend-image
          cache-to: type=gha,mode=max,scope=backend-image

      - name: Frontend image metadata
        id: frontend-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.registry.outputs.owner }}/stockscreenclaude-frontend
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=/api
          tags: ${{ steps.frontend-meta.outputs.tags }}
          labels: ${{ steps.frontend-meta.outputs.labels }}
          cache-from: type=gha,scope=frontend-image
          cache-to: type=gha,mode=max,scope=frontend-image

  release:
    name: Create GitHub Release
    needs: [backend, frontend, publish-images]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: .github/release-notes.md
