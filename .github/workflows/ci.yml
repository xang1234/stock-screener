name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Quality Gates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: "Gate 0: Theme identity invariants"
        run: make gate-identity

      - name: Gate check (verify all SE test files are assigned)
        run: make gate-check

      - name: "Gate 1: Detector correctness"
        run: make gate-1

      - name: "Gate 2: Temporal integrity"
        run: make gate-2

      - name: "Gate 3: Integration coverage"
        run: make gate-3

      - name: "Gate 4: Performance baselines"
        run: make gate-4

      - name: "Gate 5: Golden regression"
        run: make gate-5

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Lint
        run: cd frontend && npm run lint

      - name: Test
        run: cd frontend && npm run test:run

  windows-desktop:
    name: Windows Desktop Bundle
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-desktop.txt

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend for desktop bundle
        run: cd frontend && npm run build
        env:
          VITE_API_URL: /api

      - name: Install desktop dependencies
        run: pip install -r backend/requirements-desktop.txt

      - name: Build desktop bundle
        run: pyinstaller backend/desktop/StockScanner.spec --noconfirm --clean

      - name: Launch desktop bundle
        shell: pwsh
        run: |
          $stdout = Join-Path $env:RUNNER_TEMP "desktop-bundle.stdout.log"
          $stderr = Join-Path $env:RUNNER_TEMP "desktop-bundle.stderr.log"
          $process = Start-Process -FilePath "dist/StockScanner/StockScanner.exe" `
            -ArgumentList "--no-browser","--port","8765" `
            -RedirectStandardOutput $stdout `
            -RedirectStandardError $stderr `
            -PassThru
          "DESKTOP_BUNDLE_STDOUT=$stdout" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "DESKTOP_BUNDLE_STDERR=$stderr" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Start-Sleep -Seconds 5
          if ($process.HasExited) {
            Write-Host "Desktop bundle exited during launch"
            if (Test-Path $stdout) { Get-Content $stdout }
            if (Test-Path $stderr) { Get-Content $stderr }
            exit 1
          }

      - name: Run desktop smoke test
        run: python backend/desktop/smoke_test.py --base-url http://127.0.0.1:8765

      - name: Dump desktop logs on failure
        if: failure()
        shell: pwsh
        run: |
          if ($env:DESKTOP_BUNDLE_STDOUT -and (Test-Path $env:DESKTOP_BUNDLE_STDOUT)) {
            Write-Host "Desktop bundle stdout:"
            Get-Content $env:DESKTOP_BUNDLE_STDOUT
          }
          if ($env:DESKTOP_BUNDLE_STDERR -and (Test-Path $env:DESKTOP_BUNDLE_STDERR)) {
            Write-Host "Desktop bundle stderr:"
            Get-Content $env:DESKTOP_BUNDLE_STDERR
          }

      - name: Stop desktop bundle
        if: always()
        shell: pwsh
        run: |
          if (Test-Path "dist/StockScanner/StockScanner.exe") {
            & "dist/StockScanner/StockScanner.exe" --stop
          }
