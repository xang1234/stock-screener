name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Quality Gates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: "Gate 0: Theme identity invariants"
        run: make gate-identity

      - name: Gate check (verify all SE test files are assigned)
        run: make gate-check

      - name: "Gate 1: Detector correctness"
        run: make gate-1

      - name: "Gate 2: Temporal integrity"
        run: make gate-2

      - name: "Gate 3: Integration coverage"
        run: make gate-3

      - name: "Gate 4: Performance baselines"
        run: make gate-4

      - name: "Gate 5: Golden regression"
        run: make gate-5

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Lint
        run: cd frontend && npm run lint

      - name: Test
        run: cd frontend && npm run test:run

  windows-desktop:
    name: Windows Desktop Bundle
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-desktop.txt

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend for desktop bundle
        run: cd frontend && npm run build
        env:
          VITE_API_URL: /api

      - name: Install desktop dependencies
        run: pip install -r backend/requirements-desktop.txt

      - name: Build desktop bundle
        run: pyinstaller backend/desktop/StockScanner.spec --noconfirm --clean

      - name: Launch desktop bundle and run smoke test
        shell: pwsh
        run: |
          $stdout = Join-Path $env:RUNNER_TEMP "desktop-bundle.stdout.log"
          $stderr = Join-Path $env:RUNNER_TEMP "desktop-bundle.stderr.log"
          $process = $null
          $smokeExitCode = 0
          $launchFailed = $false

          try {
            $process = Start-Process -FilePath "dist/StockScanner/StockScanner.exe" `
              -ArgumentList "--no-browser","--port","8765" `
              -RedirectStandardOutput $stdout `
              -RedirectStandardError $stderr `
              -PassThru

            Start-Sleep -Seconds 5
            if ($process.HasExited) {
              $launchFailed = $true
              Write-Host "Desktop bundle exited during launch"
            } else {
              python backend/desktop/smoke_test.py --base-url http://127.0.0.1:8765
              $smokeExitCode = $LASTEXITCODE
            }

            if ($launchFailed -or $smokeExitCode -ne 0) {
              if (Test-Path $stdout) {
                Write-Host "Desktop bundle stdout:"
                Get-Content $stdout
              }
              if (Test-Path $stderr) {
                Write-Host "Desktop bundle stderr:"
                Get-Content $stderr
              }
            }
          } finally {
            if ($process -and -not $process.HasExited) {
              & "dist/StockScanner/StockScanner.exe" --stop
              Start-Sleep -Seconds 2
            }
            if ($process -and -not $process.HasExited) {
              Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
            }
          }

          if ($launchFailed) {
            exit 1
          }
          exit $smokeExitCode

      - name: Stop desktop bundle
        if: always()
        shell: pwsh
        run: |
          if (Test-Path "dist/StockScanner/StockScanner.exe") {
            & "dist/StockScanner/StockScanner.exe" --stop
          }

      - name: Build Windows installer
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          choco install innosetup --yes --no-progress
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" backend\desktop\windows_installer.iss

      - name: Upload installer artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/installer/StockScanner-Setup.exe

      - name: Upload portable bundle artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: dist/StockScanner/

  publish-images:
    name: Publish Docker Images
    needs: [backend, frontend]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Normalize GHCR owner
        id: registry
        shell: bash
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend image metadata
        id: backend-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.registry.outputs.owner }}/stockscreenclaude-backend
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.backend-meta.outputs.tags }}
          labels: ${{ steps.backend-meta.outputs.labels }}
          cache-from: type=gha,scope=backend-image
          cache-to: type=gha,mode=max,scope=backend-image

      - name: Frontend image metadata
        id: frontend-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.registry.outputs.owner }}/stockscreenclaude-frontend
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: Dockerfile
          push: true
          build-args: |
            VITE_API_URL=/api
          tags: ${{ steps.frontend-meta.outputs.tags }}
          labels: ${{ steps.frontend-meta.outputs.labels }}
          cache-from: type=gha,scope=frontend-image
          cache-to: type=gha,mode=max,scope=frontend-image

  release:
    name: Create GitHub Release
    needs: [backend, frontend, windows-desktop, publish-images]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: release/

      - name: Download portable artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-portable
          path: portable/

      - name: Zip portable bundle
        run: cd portable && zip -r ../release/StockScanner-Portable.zip .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/StockScanner-Setup.exe
            release/StockScanner-Portable.zip
