[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
filterwarnings =
    error::FutureWarning
markers =
    integration: marks tests as integration tests (require running server)
    live_service: marks tests that require an explicitly started live backend and external services
    slow: marks tests as slow running tests
    performance: marks tests as query performance benchmarks
    load: marks tests as per-market load/soak benchmarks (require Redis; opt-in via gate-6-load)
    allow_real_celery_dispatch: allows a unit test to exercise Celery's real apply_async path
