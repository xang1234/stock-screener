# =============================================================================
# Docker Compose Production Override
# =============================================================================
# Adds production features: resource limits, health checks, logging, security.
#
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Requires .env.docker file with at minimum:
#   - CORS_ORIGINS (e.g., https://stocks.yourdomain.com)
#   - At least one LLM API key for chatbot functionality
#
# =============================================================================

services:
  postgres:
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  redis:
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    env_file:
      - .env.docker
    environment:
      # Override CORS from .env.docker, with sensible default
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost,http://localhost:80}
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  celery-general:
    env_file:
      - .env.docker
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app inspect ping -d general@$$HOSTNAME"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

